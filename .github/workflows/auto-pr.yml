name: Auto-open PR to main

on:
  push:
    branches-ignore:
      - main

jobs:
  open-pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Create PR if one doesn't exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          EXISTING=$(gh pr list --base main --head "$BRANCH" --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists for $BRANCH — skipping."
          else
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "Merge $BRANCH into main" \
              --body "Automated PR opened by GitHub Actions on push to \`$BRANCH\`." \
              --draft
            echo "PR created for $BRANCH"
          fi
