name: Auto-open PR to main

on:
  push:
    branches-ignore:
      - main

jobs:
  open-pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Create PR if one doesn't exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          if gh pr view "$BRANCH" --json number --jq '.number' > /dev/null 2>&1; then
            echo "PR already exists for $BRANCH — skipping."
          else
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "Merge $BRANCH into main" \
              --body "Automated PR opened by GitHub Actions on push to \`$BRANCH\`."
            echo "PR created for $BRANCH"
          fi
