name: Auto-open PR to main

on:
  push:
    branches-ignore:
      - main

jobs:
  open-pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Create PR if one doesn't exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${GITHUB_REF_NAME}"

          OPEN_PR=$(gh pr list --state open --head "$BRANCH" --json number --jq '.[0].number' 2>/dev/null)
          if [ -n "$OPEN_PR" ]; then
            echo "Open PR #$OPEN_PR already exists for $BRANCH тАФ skipping."
          else
            # Derive a human-readable title from the branch name:
            # strip common prefixes (feature/, fix/, chore/, etc.) and replace - with spaces
            TITLE=$(echo "$BRANCH" \
              | sed 's|^feature/||;s|^fix/||;s|^chore/||;s|^hotfix/||;s|^docs/||' \
              | tr '-' ' ')

            # Fetch main so we can diff against it
            git fetch origin main --depth=50

            # Separate meaningful commits (feat/fix) from housekeeping (ci/chore/docs)
            FEAT_FIX_COMMITS=$(git log origin/main..HEAD --no-merges \
              --format="### %s%n%n%b" \
              --grep="^feat\|^fix" 2>/dev/null | sed '/^$/d' || true)
            OTHER_COMMITS=$(git log origin/main..HEAD --no-merges \
              --oneline --no-decorate \
              --invert-grep --grep="^feat\|^fix" 2>/dev/null || true)

            # Changed files summary
            DIFF_STAT=$(git diff --stat origin/main...HEAD 2>/dev/null || echo "_(diff unavailable)_")

            BODY="## Branch: \`$BRANCH\`"$'\n'
            BODY+=$'\n### Why this branch was created\n'
            BODY+="<!-- Edit this PR to add more context about the purpose of this branch. -->"$'\n'
            BODY+="Branch name suggests: **$TITLE**"$'\n'
            if [ -n "$FEAT_FIX_COMMITS" ]; then
              BODY+=$'\n---\n\n## Changes\n\n'
              BODY+="$FEAT_FIX_COMMITS"$'\n'
            fi
            if [ -n "$OTHER_COMMITS" ]; then
              BODY+=$'\n<details><summary>CI / housekeeping commits</summary>\n\n'
              BODY+='```'$'\n'"$OTHER_COMMITS"$'\n''```'$'\n'
              BODY+=$'</details>\n'
            fi
            BODY+=$'\n### Changed files\n'
            BODY+='```'$'\n'"$DIFF_STAT"$'\n''```'$'\n'
            BODY+=$'\n---\n'
            BODY+="_Automated PR opened by GitHub Actions on push to \`$BRANCH\`._"

            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "$TITLE" \
              --body "$BODY"

            echo "PR created for $BRANCH"
          fi
